info:
  name: Get All Students
  type: http
  seq: 3

http:
  method: GET
  url: "{{SUPABASE_URL}}/rest/v1/students?select=*"
  headers:
    - name: apikey
      value: "{{SUPABASE_ANON_KEY}}"
    - name: Authorization
      value: Bearer {{SUPABASE_ANON_KEY}}
  params:
    - name: select
      value: "*"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Should return a 200 status", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Should have at least one student", function() {
          expect(res.getBody().length).to.be.at.least(1);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
